  href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Permanent+Marker&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
  rel="stylesheet">

<style>
  /* ───────────── tokens ───────────── */
  :root {
    --bg:        #f4f0e6;
    --paper:     #ece6d7;
    --paper-2:   #e3dcc8;
    --ink:       #2a1410;
    --ink-soft:  #5a3328;
    --ink-faint: rgba(42,20,16,0.55);
    --maroon:    #6b2419;
    --accent:    #e8702c;
    --good:      #5a7d3a;
    --warn:      #c98a1f;
    --bad:       #c14a2a;
    --rule:      rgba(42,20,16,0.18);
    --rule-soft: rgba(42,20,16,0.10);
    --card:      #fbf7eb;
    --dot:       rgba(107,36,25,0.13);

    --hand: "Caveat", "Bradley Hand", cursive;
    --mono: "JetBrains Mono", ui-monospace, "SF Mono", monospace;
    --serif: "Newsreader", "Source Serif Pro", Georgia, serif;
  }
  [data-theme="dark"] {
    --bg:        #14110f;
    --paper:     #1a1614;
    --paper-2:   #221c19;
    --ink:       #f4f0e6;
    --ink-soft:  #cbbfa6;
    --ink-faint: rgba(244,240,230,0.55);
    --maroon:    #f4f0e6;
    --accent:    #ff8a3d;
    --good:      #9bc16a;
    --warn:      #ecb35a;
    --bad:       #ff7a55;
    --rule:      rgba(244,240,230,0.18);
    --rule-soft: rgba(244,240,230,0.08);
    --card:      #1f1a17;
    --dot:       rgba(244,240,230,0.07);
  }

  /* ───────────── base ───────────── */
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0;
    background:
      radial-gradient(var(--dot) 1px, transparent 1.2px) var(--bg);
    background-size: 18px 18px;
    color: var(--ink);
    font-family: var(--serif);
    font-size: 17px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    transition: background-color .35s ease, color .35s ease;
    text-wrap: pretty;
  }
  a { color: inherit; text-decoration: none; }
  ::selection { background: var(--accent); color: var(--bg); }

  .ag-app { max-width: 1240px; margin: 0 auto; padding: 24px 32px 80px; }

  /* ───────────── nav ───────────── */
  .ag-nav {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 18px 28px;
    background: var(--card);
    border: 1.5px solid var(--ink);
    border-radius: 14px;
    box-shadow: 4px 6px 0 0 var(--ink);
    position: sticky; top: 16px; z-index: 50;
    transition: background-color .35s, border-color .35s, box-shadow .35s;
  }
  .ag-logo { display: inline-flex; align-items: center; gap: 10px; color: var(--maroon); }
  .ag-logo-text {
    font-family: var(--hand);
    font-size: 34px; font-weight: 700;
    letter-spacing: -0.01em; line-height: 1;
    color: var(--maroon);
    transform: translateY(2px);
  }
  .ag-nav-links {
    display: flex; gap: 28px;
    font-family: var(--mono);
    font-size: 13px; letter-spacing: 0.06em;
    text-transform: lowercase;
    color: var(--ink-soft);
  }
  .ag-nav-links a { position: relative; padding: 2px 0; }
  .ag-nav-links a:hover { color: var(--ink); }
  .ag-nav-links a:hover::after {
    content: ""; position: absolute; left: -2px; right: -2px; bottom: -4px;
    height: 6px;
    background: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 60 6' preserveAspectRatio='none'><path d='M 2 4 Q 10 1 18 4 T 34 4 T 50 3 T 58 4' fill='none' stroke='%236b2419' stroke-width='2' stroke-linecap='round'/></svg>") repeat-x;
  }
  [data-theme="dark"] .ag-nav-links a:hover::after {
    background: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 60 6' preserveAspectRatio='none'><path d='M 2 4 Q 10 1 18 4 T 34 4 T 50 3 T 58 4' fill='none' stroke='%23f4f0e6' stroke-width='2' stroke-linecap='round'/></svg>") repeat-x;
  }
  .ag-nav-right {
    display: flex; align-items: center; gap: 12px; justify-content: flex-end;
  }
  .ag-toggle {
    width: 36px; height: 36px; border-radius: 50%;
    background: transparent; border: 1.5px solid var(--ink); color: var(--ink);
    cursor: pointer; font-size: 16px; line-height: 1;
    transition: background .15s, transform .2s;
  }
  .ag-toggle:hover { background: var(--ink); color: var(--bg); transform: rotate(20deg); }
  /* The language toggle reuses .ag-toggle's chrome but shows text. */
  .ag-lang-toggle {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.04em;
  }
  .ag-lang-toggle:hover { transform: scale(1.06); }

  /* (legacy segmented language switcher — removed, kept fallback hidden) */

  /* ───────────── buttons ───────────── */
  .ag-btn {
    position: relative;
    display: inline-flex; align-items: center; gap: 8px;
    padding: 9px 18px;
    border-radius: 999px;
    border: 1.5px solid var(--ink);
    font-family: var(--mono); font-size: 13px;
    letter-spacing: 0.04em; text-transform: lowercase;
    cursor: pointer;
    transition: transform .15s ease, box-shadow .15s ease, background .2s, color .2s;
    color: var(--ink); background: transparent;
  }
  .ag-btn:hover { transform: translate(-1px,-1px); box-shadow: 3px 3px 0 0 var(--ink); }
  .ag-btn:active { transform: translate(1px,1px); box-shadow: none; }
  .ag-btn-primary { background: var(--ink); color: var(--bg); }
  .ag-btn-primary:hover { background: var(--ink); }
  .ag-btn-ghost { background: transparent; }
  .ag-btn-lg { padding: 14px 24px; font-size: 14px; }
  .ag-btn-full { width: 100%; justify-content: center; }

  /* ───────────── hero ───────────── */
  .ag-hero { padding: 80px 16px 40px; position: relative; }
  .ag-hero-grid {
    display: grid;
    grid-template-columns: 1.15fr 0.85fr;
    gap: 40px;
    align-items: center;
  }
  .ag-eyebrow {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: var(--mono); font-size: 12px;
    letter-spacing: 0.32em; text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 24px;
  }
  .ag-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
  .ag-dot-pulse { box-shadow: 0 0 0 0 var(--accent); animation: agpulse 1.8s infinite; }
  @keyframes agpulse {
    0%   { box-shadow: 0 0 0 0 rgba(232,112,44,0.7); }
    70%  { box-shadow: 0 0 0 10px rgba(232,112,44,0); }
    100% { box-shadow: 0 0 0 0 rgba(232,112,44,0); }
  }

  .ag-headline {
    font-family: var(--hand);
    font-weight: 700;
    font-size: clamp(56px, 9vw, 116px);
    line-height: 0.9;
    letter-spacing: -0.02em;
    margin: 0 0 28px;
    color: var(--ink);
  }
  .ag-headline-em { position: relative; display: inline-block; color: var(--maroon); }

  .ag-lede {
    font-family: var(--serif);
    font-size: clamp(18px, 1.5vw, 21px);
    line-height: 1.55;
    color: var(--ink-soft);
    max-width: 540px;
    margin: 0 0 32px;
  }
  .ag-lede em { font-style: italic; color: var(--ink); }

  .ag-cta-row {
    display: flex; gap: 14px; flex-wrap: wrap;
    align-items: center;
  }
  .ag-hero-meta {
    display: flex; gap: 10px; flex-wrap: wrap;
    margin-top: 22px;
    font-family: var(--mono); font-size: 12px;
    color: var(--ink-faint);
    letter-spacing: 0.04em;
  }
  .ag-bullet { opacity: 0.5; }

  /* hero art */
  .ag-hero-art {
    position: relative;
    display: flex; justify-content: center; align-items: center;
    color: var(--maroon);
  }
  .ag-creature-wrap {
    position: relative;
    padding: 60px;
    animation: agfloat 6s ease-in-out infinite;
  }
  @keyframes agfloat {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50%      { transform: translateY(-10px) rotate(-1deg); }
  }

  /* Cursor-tracking eye and pupil are SVG circles rendered inside the
     character viewBox — no extra CSS positioning needed. The pupil group
     gets a quick CSS transition for smoothness. */
  .ag-pupil-g { transition: transform 0.12s cubic-bezier(.2, .8, .2, 1); transform-box: fill-box; transform-origin: center; }
  .ag-anno {
    position: absolute;
    display: flex; align-items: center; gap: 4px;
    font-family: var(--hand);
    font-size: 22px; color: var(--ink);
    white-space: nowrap;
  }
  .ag-anno svg { color: var(--ink); }
  .ag-anno-1 { top: 22%;  left: -30px; }
  .ag-anno-2 { top: 14%;  right: -30px; }
  .ag-anno-3 { bottom: 30%; left: -50px; color: var(--accent); }
  .ag-anno-3 svg { color: var(--accent); }
  .ag-anno-4 { bottom: 8%; right: -20px; color: var(--bad); }
  .ag-anno-4 svg { color: var(--bad); }

  /* logo strip */
  .ag-logos {
    margin-top: 80px;
    border-top: 1.5px solid var(--rule);
    border-bottom: 1.5px solid var(--rule);
    padding: 22px 0;
    display: flex; align-items: center; gap: 32px;
    flex-wrap: wrap;
  }
  .ag-logos-label {
    font-family: var(--mono); font-size: 11px;
    letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--ink-faint);
    flex: 0 0 auto;
  }
  .ag-logos-row {
    display: flex; gap: 36px; flex-wrap: wrap;
    flex: 1; align-items: center; justify-content: space-between;
  }
  .ag-logo-mark {
    font-family: var(--mono); font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.04em;
    color: var(--ink-soft);
    opacity: 0.7;
  }

  /* ───────────── section heads ───────────── */
  .ag-section-head { max-width: 760px; margin: 120px auto 40px; padding: 0 16px; text-align: center; }
  .ag-section-head-tight { margin-bottom: 32px; }
  .ag-section-head .ag-eyebrow {
    justify-content: center;
    margin-bottom: 16px;
  }
  .ag-h2 {
    font-family: var(--hand);
    font-weight: 700;
    font-size: clamp(40px, 6vw, 76px);
    line-height: 1.02;
    letter-spacing: -0.01em;
    margin: 0;
    color: var(--ink);
  }
  .ag-em { color: var(--maroon); }
  .ag-section-sub {
    margin-top: 18px;
    font-family: var(--serif);
    font-size: 18px;
    color: var(--ink-soft);
    max-width: 580px;
    margin-left: auto; margin-right: auto;
  }
  /* Strikethrough wraps inline so it never paints over the next line. */
  .ag-strike {
    color: var(--ink-soft);
    background-image: linear-gradient(transparent calc(50% - 2px), var(--bad) calc(50% - 2px), var(--bad) calc(50% + 2px), transparent calc(50% + 2px));
    background-repeat: no-repeat;
    background-size: 100% 100%;
    padding: 0 2px;
  }
  .ag-strike svg { display: none; }

  /* ───────────── problem ───────────── */
  .ag-problem-grid {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 0;
    border: 1.5px solid var(--ink);
    background: var(--card);
    box-shadow: 5px 6px 0 0 var(--ink);
    border-radius: 14px;
    overflow: hidden;
  }
  .ag-problem-card {
    padding: 32px 24px;
    border-right: 1.5px dashed var(--rule);
    display: flex; flex-direction: column; gap: 14px;
    min-height: 200px;
  }
  .ag-problem-card:last-child { border-right: none; }
  .ag-problem-k {
    font-family: var(--hand);
    font-size: 88px; line-height: 0.85;
    color: var(--accent);
    font-weight: 700;
  }
  .ag-problem-v {
    font-family: var(--serif);
    font-size: 15px; line-height: 1.45;
    color: var(--ink-soft);
  }

  /* ───────────── features ───────────── */
  .ag-features-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 24px;
    margin-top: 8px;
  }
  .ag-feature {
    background: var(--card);
    border: 1.5px solid var(--ink);
    border-radius: 18px;
    padding: 28px;
    box-shadow: 4px 6px 0 0 var(--ink);
    display: flex; flex-direction: column;
    color: var(--maroon);
    transition: transform .25s ease, box-shadow .25s ease;
  }
  .ag-feature:hover { transform: translate(-2px,-2px); box-shadow: 6px 8px 0 0 var(--ink); }
  .ag-feature-art {
    height: 220px;
    display: flex; align-items: center; justify-content: center;
    position: relative;
    margin: -8px -8px 12px;
  }
  .ag-watch { position: relative; width: 100%; height: 220px; display: flex; align-items: center; justify-content: center; }
  .ag-eye-glow {
    position: absolute;
    left: 51%; top: 47%;
    width: 22px; height: 22px;
    background: var(--accent);
    border-radius: 50%;
    transform: translate(-50%,-50%);
    box-shadow: 0 0 28px 8px rgba(232,112,44,0.55);
    animation: agblink 4s infinite;
  }
  @keyframes agblink {
    0%,90%,100% { transform: translate(-50%,-50%) scaleY(1); }
    93%         { transform: translate(-50%,-50%) scaleY(0.05); }
  }
  .ag-caged { position: relative; width: 100%; height: 220px; display: flex; align-items: center; justify-content: center; color: var(--maroon); }
  .ag-bars { position: absolute; inset: 0; pointer-events: none; color: var(--ink); }

  .ag-feature-tag {
    font-family: var(--mono); font-size: 11px;
    letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--ink-faint);
    margin-top: 8px;
  }
  .ag-feature-title {
    font-family: var(--hand);
    font-weight: 700;
    font-size: 44px; line-height: 0.95;
    margin: 8px 0 12px;
    color: var(--ink);
  }
  .ag-feature-sub {
    color: var(--maroon);
    font-size: 28px;
  }
  .ag-feature-body {
    font-family: var(--serif);
    color: var(--ink-soft);
    margin: 0 0 18px;
    font-size: 15.5px; line-height: 1.55;
    flex: 1;
  }
  .ag-feature-bullets {
    list-style: none; padding: 0; margin: 0;
    border-top: 1.5px dashed var(--rule);
    padding-top: 16px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .ag-feature-bullets li {
    display: flex; align-items: flex-start; gap: 8px;
    font-family: var(--mono); font-size: 12.5px;
    line-height: 1.45;
    color: var(--ink-soft);
    letter-spacing: 0.01em;
  }
  .ag-check {
    color: var(--accent);
    font-weight: 700;
    font-family: var(--hand);
    font-size: 20px;
    line-height: 0.8;
    flex: 0 0 auto;
  }

  /* ───────────── dashboard mock ───────────── */
  .ag-dash-frame {
    background: var(--card);
    border: 1.5px solid var(--ink);
    border-radius: 16px;
    box-shadow: 8px 12px 0 0 var(--ink);
    overflow: hidden;
    margin-top: 16px;
    position: relative;
  }
  .ag-dash-chrome {
    display: flex; align-items: center; gap: 8px;
    padding: 12px 16px;
    background: var(--paper);
    border-bottom: 1.5px solid var(--ink);
    position: relative;
  }
  .ag-dot-os { width: 11px; height: 11px; border-radius: 50%; border: 1.2px solid var(--ink); }
  .ag-dot-r  { background: #f47b6b; }
  .ag-dot-y  { background: #f5c451; }
  .ag-dot-g  { background: #7fc468; }
  .ag-dash-url {
    position: absolute; left: 50%; transform: translateX(-50%);
    font-family: var(--mono); font-size: 12px;
    color: var(--ink-faint); letter-spacing: 0.02em;
  }
  .ag-dash-body {
    display: grid;
    grid-template-columns: 200px 1fr 280px;
    min-height: 460px;
  }
  .ag-dash-side {
    background: var(--paper);
    border-right: 1.5px solid var(--rule);
    padding: 16px 12px;
    display: flex; flex-direction: column; gap: 18px;
  }
  .ag-dash-org {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px;
    border: 1.5px solid var(--ink);
    border-radius: 8px;
    background: var(--card);
    color: var(--maroon);
    font-family: var(--mono); font-size: 13px; font-weight: 700;
    letter-spacing: 0.02em;
  }
  .ag-dash-org span:nth-child(2) { flex: 1; color: var(--ink); }
  .ag-dash-chev { opacity: 0.5; }
  .ag-dash-nav { display: flex; flex-direction: column; gap: 2px; }
  .ag-dash-navitem {
    padding: 7px 10px;
    border-radius: 6px;
    font-family: var(--mono); font-size: 13px;
    color: var(--ink-soft);
    cursor: pointer;
    letter-spacing: 0.02em;
  }
  .ag-dash-navitem:hover { background: var(--paper-2); color: var(--ink); }
  .ag-dash-navitem.ag-active {
    background: var(--ink); color: var(--bg);
    font-weight: 600;
  }
  .ag-dash-budget {
    margin-top: auto;
    padding: 12px;
    background: var(--card);
    border: 1.5px dashed var(--rule);
    border-radius: 8px;
  }
  .ag-dash-budget-label {
    font-family: var(--mono); font-size: 10px;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--ink-faint);
  }
  .ag-dash-budget-amt {
    font-family: var(--hand); font-size: 30px;
    font-weight: 700; color: var(--ink);
    line-height: 1; margin-top: 4px;
  }
  .ag-dash-budget-amt span {
    font-size: 16px;
    color: var(--ink-faint);
    margin-left: 4px;
  }
  .ag-dash-budget-bar {
    margin-top: 8px;
    height: 6px;
    background: var(--paper-2);
    border-radius: 3px;
    overflow: hidden;
  }
  .ag-dash-budget-bar span {
    display: block; height: 100%;
    background: var(--good);
  }

  .ag-dash-main {
    padding: 20px 24px;
    position: relative;
    color: var(--ink);
  }
  .ag-dash-toolbar {
    display: flex; align-items: flex-end; justify-content: space-between;
    margin-bottom: 16px; flex-wrap: wrap; gap: 12px;
  }
  .ag-dash-h {
    font-family: var(--hand);
    font-size: 36px; font-weight: 700;
    margin: 0; line-height: 1;
    color: var(--maroon);
  }
  .ag-dash-count {
    font-family: var(--mono); font-size: 12px;
    color: var(--ink-faint);
    margin-left: 10px;
    letter-spacing: 0.04em;
    font-weight: 400;
  }
  .ag-dash-filters { display: flex; gap: 8px; }
  .ag-pill {
    padding: 6px 12px;
    border: 1.2px solid var(--rule);
    border-radius: 999px;
    background: var(--card);
    font-family: var(--mono); font-size: 12px;
    color: var(--ink-soft);
    cursor: pointer;
  }
  .ag-pill-primary {
    background: var(--ink);
    color: var(--bg);
    border-color: var(--ink);
    font-weight: 600;
  }

  /* ───────────── filter dropdown ───────────── */
  .ag-dropdown {
    position: relative;
    display: inline-block;
  }
  .ag-pill-dd {
    border: 1.2px solid var(--rule);
    cursor: pointer;
    transition: background .12s;
  }
  .ag-pill-dd:hover { background: var(--paper); }
  .ag-pill-dd-open {
    background: var(--ink);
    color: var(--bg);
    border-color: var(--ink);
  }
  .ag-pill-dd-open .ag-faint { color: color-mix(in oklab, var(--bg) 65%, transparent); }
  .ag-pill-chev {
    margin-left: 4px;
    font-family: var(--mono);
    line-height: 1;
    transform: translateY(-1px);
  }
  .ag-dropdown-menu {
    position: absolute;
    top: calc(100% + 6px);
    right: 0;
    min-width: 170px;
    background: var(--card);
    border: 1.5px solid var(--ink);
    border-radius: 10px;
    box-shadow: 4px 6px 0 0 var(--ink);

<!-- Re-usable character sprite, injected once at top so all <use> tags resolve. -->
<svg xmlns="http://www.w3.org/2000/svg" width="0" height="0" style="position:absolute" aria-hidden="true">
  <symbol id="agentma-symbol-mount"></symbol>
</svg>

<div id="root"></div>

<script>
  // Inject the two <symbol>s using the path data we already loaded.
  // Keeping this here (vs hardcoding the 30 paths in the HTML) keeps this
  // file readable and editable, while still making the character available
  // to every <use href="#agentma">.
  (function mountSymbols() {
    const d = window.AGENTMA;
    const ns = 'http://www.w3.org/2000/svg';
    const wrap = document.createElementNS(ns, 'svg');
    wrap.setAttribute('style', 'position:absolute;width:0;height:0;overflow:hidden');
    wrap.setAttribute('aria-hidden', 'true');

    function makeSym(id, viewBox) {
      const sym = document.createElementNS(ns, 'symbol');
      sym.setAttribute('id', id);
      sym.setAttribute('viewBox', viewBox);
      const g = document.createElementNS(ns, 'g');
      g.setAttribute('fill', 'none');
      g.setAttribute('stroke', 'currentColor');
      g.setAttribute('stroke-linecap', 'round');
      g.setAttribute('stroke-linejoin', 'round');
      d.paths.forEach(p => {
        const path = document.createElementNS(ns, 'path');
        path.setAttribute('d', p);
        g.appendChild(path);
      });
      sym.appendChild(g);
      return sym;
    }

    wrap.appendChild(makeSym('agentma', `0 0 ${d.w} ${d.h}`));
    wrap.appendChild(makeSym('agentma-head', '40 0 580 460'));
    document.body.insertBefore(wrap, document.body.firstChild);
  })();
</script>

<script type="text/babel">
  const root = ReactDOM.createRoot(document.getElementById('root'));
  const start = () => root.render(<window.AgentmaApp/>);
  if (document.fonts && document.fonts.ready) {
    Promise.race([document.fonts.ready, new Promise(r => setTimeout(r, 1500))]).then(start);
  } else {
    start();
  }
</script>
