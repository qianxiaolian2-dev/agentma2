<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<title>midnight-spider · agent · agentma</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="icon" type="image/svg+xml" href="favicon.svg" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link
  href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Newsreader:opsz,wght@6..72,400;6..72,500&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
  rel="stylesheet">

<style>
  /* ───────────── tokens (same as landing page) ───────────── */
  :root {
    --bg:        #f4f0e6;
    --paper:     #ece6d7;
    --paper-2:   #e3dcc8;
    --ink:       #2a1410;
    --ink-soft:  #5a3328;
    --ink-faint: rgba(42,20,16,0.55);
    --maroon:    #6b2419;
    --accent:    #e8702c;
    --good:      #5a7d3a;
    --warn:      #c98a1f;
    --bad:       #c14a2a;
    --rule:      rgba(42,20,16,0.18);
    --rule-soft: rgba(42,20,16,0.10);
    --card:      #fbf7eb;
    --dot:       rgba(107,36,25,0.13);

    --hand: "Caveat", cursive;
    --mono: "JetBrains Mono", monospace;
    --serif: "Newsreader", Georgia, serif;
  }
  [data-theme="dark"] {
    --bg:        #14110f;
    --paper:     #1a1614;
    --paper-2:   #221c19;
    --ink:       #f4f0e6;
    --ink-soft:  #cbbfa6;
    --ink-faint: rgba(244,240,230,0.55);
    --maroon:    #f4f0e6;
    --accent:    #ff8a3d;
    --good:      #9bc16a;
    --warn:      #ecb35a;
    --bad:       #ff7a55;
    --rule:      rgba(244,240,230,0.18);
    --rule-soft: rgba(244,240,230,0.08);
    --card:      #1f1a17;
    --dot:       rgba(244,240,230,0.07);
  }

  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0;
    background: radial-gradient(var(--dot) 1px, transparent 1.2px) var(--bg);
    background-size: 18px 18px;
    color: var(--ink);
    font-family: var(--serif);
    font-size: 16px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }
  a { color: inherit; text-decoration: none; }
  ::selection { background: var(--accent); color: var(--bg); }

  .ag-app { max-width: 1280px; margin: 0 auto; padding: 24px 32px 80px; }
  .ag-mono { font-family: var(--mono); font-weight: 600; }
  .ag-bullet { opacity: 0.4; }
  .ag-faint { color: var(--ink-faint); }

  /* ───────────── top nav (same chrome as landing) ───────────── */
  .ag-nav {
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 24px;
    padding: 18px 28px;
    background: var(--card);
    border: 1.5px solid var(--ink);
    border-radius: 14px;
    box-shadow: 4px 6px 0 0 var(--ink);
    position: sticky; top: 16px; z-index: 50;
  }
  .ag-logo { display: inline-flex; align-items: center; gap: 10px; color: var(--maroon); }
  .ag-logo-text {
    font-family: var(--hand); font-size: 32px; font-weight: 700;
    letter-spacing: -0.01em; line-height: 1; color: var(--maroon);
    transform: translateY(2px);
  }
  .ag-crumbs {
    display: flex; align-items: center; gap: 10px;
    font-family: var(--mono); font-size: 13px;
    color: var(--ink-soft);
    letter-spacing: 0.02em;
  }
  .ag-crumbs a:hover { color: var(--ink); }
  .ag-crumb-sep { color: var(--ink-faint); }
  .ag-crumb-active { color: var(--ink); font-weight: 700; }
  .ag-nav-right { display: flex; gap: 10px; align-items: center; }
  .ag-toggle {
    width: 36px; height: 36px; border-radius: 50%;
    background: transparent; border: 1.5px solid var(--ink); color: var(--ink);
    cursor: pointer; font-size: 16px; line-height: 1;
    transition: background .15s, transform .2s;
  }
  .ag-toggle:hover { background: var(--ink); color: var(--bg); transform: rotate(20deg); }
  .ag-lang-toggle {
    font-family: var(--mono); font-size: 11px; font-weight: 700;
    letter-spacing: 0.04em;
  }
  .ag-lang-toggle:hover { transform: scale(1.06); }

  /* ───────────── buttons ───────────── */
  .ag-btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 9px 18px; border-radius: 999px;
    border: 1.5px solid var(--ink);
    font-family: var(--mono); font-size: 13px;
    letter-spacing: 0.04em;
    cursor: pointer; color: var(--ink); background: transparent;
    transition: transform .15s, box-shadow .15s;
  }
  .ag-btn:hover { transform: translate(-1px,-1px); box-shadow: 3px 3px 0 0 var(--ink); }
  .ag-btn-primary { background: var(--ink); color: var(--bg); }
  .ag-btn-ghost { background: transparent; }
  .ag-btn-danger { background: var(--bad); color: var(--bg); border-color: var(--bad); }
  .ag-btn-danger:hover { box-shadow: 3px 3px 0 0 var(--bad); }
  .ag-btn-sm { padding: 6px 12px; font-size: 11px; }
  .ag-btn-full { width: 100%; justify-content: center; }

  /* ───────────── header band ───────────── */
  .ag-detail-head {
    margin: 32px 0 28px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 32px;
    align-items: end;
  }
  .ag-detail-tag {
    font-family: var(--mono); font-size: 11px;
    letter-spacing: 0.32em; text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 8px;
  }
  .ag-detail-name {
    font-family: var(--mono);
    font-size: 48px; line-height: 1;
    color: var(--ink); font-weight: 700;
    letter-spacing: -0.02em;
    margin: 0 0 14px;
  }
  .ag-detail-meta {
    display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
    font-family: var(--mono); font-size: 13px;
    color: var(--ink-soft);
  }
  .ag-detail-status { display: flex; flex-direction: column; align-items: flex-end; gap: 12px; }
  .ag-status-big {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 14px;
    border: 1.5px solid currentColor;
    border-radius: 999px;
    font-family: var(--mono); font-size: 13px; font-weight: 700;
    letter-spacing: 0.04em;
  }
  .ag-status-big.ag-status-ok  { color: var(--good); background: color-mix(in oklab, var(--good) 14%, transparent); }
  .ag-status-big.ag-status-bad { color: var(--bad);  background: color-mix(in oklab, var(--bad)  14%, transparent); }
  .ag-status-pulse {
    width: 8px; height: 8px; border-radius: 50%;
    background: currentColor;
    animation: agpulse 1.6s infinite;
  }
  @keyframes agpulse {
    0%   { box-shadow: 0 0 0 0 currentColor; opacity: 1; }
    70%  { box-shadow: 0 0 0 8px transparent; opacity: 1; }
    100% { box-shadow: 0 0 0 0 transparent; opacity: 1; }
  }
  .ag-detail-actions { display: flex; gap: 10px; }

  /* ───────────── KPI grid ───────────── */
  .ag-kpi-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }
  .ag-kpi {
    padding: 20px 22px;
    background: var(--card);
    border: 1.5px solid var(--ink);
    border-radius: 14px;
    box-shadow: 3px 4px 0 0 var(--ink);
  }
  .ag-kpi-label {
    font-family: var(--mono); font-size: 10px;
    letter-spacing: 0.25em; text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 6px;
  }
  .ag-kpi-val-row { display: flex; align-items: baseline; gap: 8px; }
  .ag-kpi-val {
    font-family: var(--hand); font-weight: 700;
    font-size: 48px; line-height: 1; color: var(--ink);
  }
  .ag-kpi-delta {
    font-family: var(--mono); font-size: 12px; font-weight: 600;
    letter-spacing: 0.02em;
    padding: 2px 7px; border-radius: 4px;
  }
  .ag-kpi-delta-ok   { background: color-mix(in oklab, var(--good) 18%, transparent); color: var(--good); }
  .ag-kpi-delta-warn { background: color-mix(in oklab, var(--warn) 22%, transparent); color: var(--warn); }
  .ag-kpi-delta-bad  { background: color-mix(in oklab, var(--bad)  20%, transparent); color: var(--bad); }
  .ag-kpi-sub { margin-top: 8px; font-family: var(--mono); font-size: 11.5px; color: var(--ink-faint); letter-spacing: 0.02em; }

  /* ───────────── chart ───────────── */
  .ag-chart {
    background: var(--card);
    border: 1.5px solid var(--ink);
    border-radius: 14px;
    padding: 20px 24px 16px;
    box-shadow: 3px 4px 0 0 var(--ink);
    margin-bottom: 28px;
  }
  .ag-chart-head { display: flex; justify-content: space-between; align-items: flex-end; gap: 24px; margin-bottom: 16px; flex-wrap: wrap; }
  .ag-section-mini {
    font-family: var(--mono); font-size: 10px;
    letter-spacing: 0.28em; text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 4px;
  }
  .ag-section-mini-row { display: flex; justify-content: space-between; align-items: center; }
  .ag-chart-total {
    font-family: var(--hand); font-weight: 700;
    font-size: 44px; line-height: 1; color: var(--ink);
  }
  .ag-chart-budget { font-family: var(--mono); font-size: 14px; color: var(--ink-faint); font-weight: 400; }
  .ag-chart-legend {
    display: flex; gap: 8px; align-items: center;
    font-family: var(--mono); font-size: 11px;
    color: var(--ink-faint);
  }
  .ag-legend-dot { width: 8px; height: 8px; border-radius: 2px; }
  .ag-legend-dot.ag-good { background: var(--good); }
  .ag-legend-dot.ag-bad  { background: var(--bad); }

  .ag-bars {
    display: grid;
    grid-template-columns: repeat(24, 1fr);
    align-items: end;
    gap: 4px;
    height: 140px;
    padding: 0 0 4px;
    border-bottom: 1.5px dashed var(--rule);
  }
  .ag-bar {
    background: var(--good);
    border-radius: 2px 2px 0 0;
    position: relative;
    transition: background .15s, transform .15s;
    cursor: pointer;
    min-height: 2px;
  }
  .ag-bar-spike { background: var(--bad); }
  .ag-bar-hover { transform: translateY(-3px); filter: brightness(1.08); }
  .ag-bar-tt {
    position: absolute;
    bottom: calc(100% + 6px);
    left: 50%; transform: translateX(-50%);
    background: var(--ink); color: var(--bg);
    padding: 4px 8px;
    border-radius: 4px;
    font-family: var(--mono); font-size: 10.5px;
    white-space: nowrap;
    z-index: 5;
    pointer-events: none;
  }
  .ag-bar-tt-h { color: color-mix(in oklab, var(--bg) 70%, transparent); }
  .ag-bar-tt-v { font-weight: 700; }
  .ag-bars-axis {
    display: flex; justify-content: space-between;
    margin-top: 6px;
    font-family: var(--mono); font-size: 10px;
    color: var(--ink-faint);
    letter-spacing: 0.06em;
  }

  /* ───────────── sessions + timeline ───────────── */
  .ag-detail-grid {
    display: grid;
    grid-template-columns: 1fr 280px;
    gap: 24px;
  }
  .ag-sessions {
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 0;
    background: var(--card);
    border: 1.5px solid var(--ink);
    border-radius: 14px;
    box-shadow: 3px 4px 0 0 var(--ink);
    overflow: hidden;
    min-height: 480px;
  }
  .ag-session-list {
    background: var(--paper);
    border-right: 1.5px solid var(--rule);
    padding: 16px 14px 14px;
    display: flex; flex-direction: column; gap: 8px;
    max-height: 640px;
    overflow-y: auto;
  }
  .ag-session-list .ag-section-mini-row { padding: 0 4px 6px; }

  .ag-session-row {
    background: transparent;
    border: 1.5px dashed var(--rule);
    border-radius: 10px;
    padding: 12px 14px;
    text-align: left;
    cursor: pointer;
    font-family: var(--serif);
    color: var(--ink);
    transition: background .15s, transform .15s, border-color .15s;
  }
  .ag-session-row:hover { background: var(--card); transform: translateX(2px); }
  .ag-session-sel {
    background: var(--card);
    border-color: var(--ink);
    border-style: solid;
    box-shadow: 2px 3px 0 0 var(--ink);
    transform: translateX(2px);
  }
  .ag-session-row-top {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 6px;
  }
  .ag-session-id { font-size: 12px; }
  .ag-session-row-label {
    font-size: 14px; color: var(--ink); line-height: 1.35;
    margin-bottom: 6px;
  }
  .ag-session-row-meta {
    display: flex; gap: 6px; flex-wrap: wrap;
    font-family: var(--mono); font-size: 11px;
    color: var(--ink-faint);
    align-items: center;
  }
  .ag-session-cost { color: var(--ink); font-weight: 700; }

  .ag-status { font-family: var(--mono); font-size: 11.5px; letter-spacing: 0.04em; }
  .ag-status-ok   { color: var(--good); }
  .ag-status-warn { color: var(--warn); }
  .ag-status-off  { color: var(--ink-faint); }
  .ag-status-bad  { color: var(--bad); }
  .ag-status-paused { color: var(--accent); }

  /* ─── timeline ─── */
  .ag-timeline-wrap {
    padding: 20px 24px;
    display: flex; flex-direction: column;
    min-height: 0;
  }
  .ag-timeline-head {
    display: flex; justify-content: space-between; align-items: flex-end;
    margin-bottom: 16px; gap: 18px; flex-wrap: wrap;
  }
  .ag-timeline-h {
    font-family: var(--serif);
    font-size: 18px; font-weight: 500;
    margin: 4px 0 0;
    color: var(--ink);
  }
  .ag-timeline-actions { display: flex; gap: 6px; }

  .ag-timeline {
    list-style: none; padding: 0; margin: 0;
    border-left: 1.5px dashed var(--rule);
    margin-left: 70px;
    padding-left: 20px;
  }
  .ag-tl-i {
    display: grid;
    grid-template-columns: 60px 60px 1fr;
    gap: 10px;
    padding: 10px 0;
    position: relative;
    align-items: start;
    border-bottom: 1px dashed var(--rule-soft);
  }
  .ag-tl-i:last-child { border-bottom: none; }
  .ag-tl-i::before {
    content: "";
    position: absolute;
    left: -27px; top: 16px;
    width: 11px; height: 11px;
    border-radius: 50%;
    background: var(--card);
    border: 2px solid var(--rule);
  }
  .ag-tl-time {
    font-family: var(--mono); font-size: 11px;
    color: var(--ink-faint);
    margin-left: -78px; /* pull into the gutter on the left of the rule */
    text-align: right;
    padding-right: 12px;
  }
  .ag-tl-kind {
    font-family: var(--mono); font-size: 10px; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 4px;
    align-self: start;
    text-align: center;
    min-width: 56px;
    height: 18px; line-height: 14px;
  }
  .ag-tl-body { min-width: 0; }
  .ag-tl-msg { font-family: var(--serif); font-size: 14.5px; color: var(--ink); line-height: 1.5; word-break: break-word; }
  .ag-tl-msg code { font-family: var(--mono); font-size: 12.5px; background: var(--paper); padding: 2px 6px; border-radius: 4px; color: var(--ink); }
  .ag-tl-meta {
    margin-top: 4px;
    font-family: var(--mono); font-size: 10.5px;
    color: var(--ink-faint);
    letter-spacing: 0.04em;
  }

  /* tone per kind */
  .ag-tl-start  .ag-tl-kind { background: color-mix(in oklab, var(--ink-soft) 20%, transparent); color: var(--ink); }
  .ag-tl-think  .ag-tl-kind { background: color-mix(in oklab, var(--ink-soft) 10%, transparent); color: var(--ink-soft); }
  .ag-tl-tool   .ag-tl-kind { background: color-mix(in oklab, var(--maroon) 18%, transparent); color: var(--maroon); }
  .ag-tl-ok     .ag-tl-kind { background: color-mix(in oklab, var(--good) 22%, transparent); color: var(--good); }
  .ag-tl-warn   .ag-tl-kind { background: color-mix(in oklab, var(--warn) 24%, transparent); color: var(--warn); }
  .ag-tl-stop   .ag-tl-kind { background: color-mix(in oklab, var(--bad)  20%, transparent); color: var(--bad); }
  .ag-tl-warn::before { border-color: var(--warn); }
  .ag-tl-stop::before { border-color: var(--bad); }
  .ag-tl-ok::before   { border-color: var(--good); }

  /* ─── guardrails ─── */
  .ag-guards {
    background: var(--card);
    border: 1.5px solid var(--ink);
    border-radius: 14px;
    padding: 20px 22px;
    box-shadow: 3px 4px 0 0 var(--ink);
    align-self: start;
    height: fit-content;
  }
  .ag-guard-row {
    display: grid; grid-template-columns: 14px 1fr auto;
    gap: 10px; align-items: center;
    padding: 10px 0;
    border-bottom: 1px dashed var(--rule-soft);
    font-family: var(--mono); font-size: 12px;
  }
  .ag-guard-row:last-of-type { border-bottom: none; }
  .ag-guard-dot { width: 10px; height: 10px; border-radius: 50%; }
  .ag-guard-dot.ag-ok { background: var(--good); }
  .ag-guard-dot.ag-warn { background: var(--warn); }
  .ag-guard-dot.ag-bad { background: var(--bad); }
  .ag-guard-name { color: var(--ink); font-weight: 600; }
  .ag-guard-val { color: var(--ink-soft); font-size: 11.5px; text-align: right; }

  /* ───────────── tool-call drawer ───────────── */
  .ag-drawer-back {
    position: fixed; inset: 0;
    background: color-mix(in oklab, var(--ink) 35%, transparent);
    z-index: 90;
    opacity: 0; pointer-events: none;
    transition: opacity .25s ease;
  }
  .ag-drawer-back.ag-drawer-open { opacity: 1; pointer-events: auto; }
  .ag-drawer {
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: min(560px, 100vw);
    background: var(--card);
    border-left: 1.5px solid var(--ink);
    box-shadow: -8px 0 30px -10px color-mix(in oklab, var(--ink) 50%, transparent);
    z-index: 100;
    display: flex; flex-direction: column;
    transform: translateX(100%);
    transition: transform .3s cubic-bezier(.2,.8,.2,1);
  }
  .ag-drawer.ag-drawer-open { transform: translateX(0); }
  .ag-drawer-head {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 22px 22px 16px;
    border-bottom: 1.5px solid var(--rule);
  }
  .ag-drawer-head-inner { flex: 1; min-width: 0; }
  .ag-drawer-h {
    font-family: var(--serif);
    font-size: 18px; font-weight: 500;
    margin: 6px 0 4px;
    color: var(--ink);
    word-break: break-word;
  }
  .ag-drawer-h code {
    font-family: var(--mono); font-size: 13.5px;
    background: var(--paper); padding: 3px 7px; border-radius: 5px;
    color: var(--ink);
  }
  .ag-drawer-tabs {
    display: flex; gap: 4px; padding: 8px 22px;
    border-bottom: 1.5px solid var(--rule);
  }
  .ag-drawer-tab {
    border: none; background: transparent;
    padding: 8px 14px;
    font-family: var(--mono); font-size: 12px;
    color: var(--ink-soft);
    letter-spacing: 0.06em; text-transform: uppercase;
    cursor: pointer;
    border-radius: 6px;
  }
  .ag-drawer-tab:hover { background: var(--paper); color: var(--ink); }
  .ag-drawer-tab-on {
    background: var(--ink) !important; color: var(--bg);
    font-weight: 700;
  }
  .ag-drawer-body {
    flex: 1; min-height: 0;
    overflow-y: auto;
    padding: 18px 22px;
  }
  .ag-code {
    background: var(--paper);
    border: 1.5px dashed var(--rule);
    border-radius: 8px;
    padding: 14px 16px;
    margin: 0;
    overflow-x: auto;
    font-family: var(--mono); font-size: 12.5px;
    line-height: 1.55;
    color: var(--ink);
    white-space: pre;
  }
  .ag-drawer-meta-grid {
    display: flex; flex-direction: column; gap: 12px;
    font-family: var(--mono); font-size: 13px;
  }
  .ag-drawer-meta-grid > div {
    display: flex; justify-content: space-between;
    padding: 10px 12px;
    background: var(--paper);
    border-radius: 8px;
  }
  .ag-drawer-meta-grid code {
    background: var(--card); padding: 2px 8px; border-radius: 4px;
  }
  .ag-drawer-foot {
    display: flex; gap: 8px; justify-content: flex-end;
    padding: 14px 22px;
    border-top: 1.5px solid var(--rule);
    background: var(--paper);
  }

  /* Make tool rows feel clickable in the timeline. */
  .ag-tl-clickable { cursor: pointer; border-radius: 6px; padding-left: 4px; margin-left: -4px; transition: background .15s; }
  .ag-tl-clickable:hover { background: var(--paper); }
  .ag-tl-clickable:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .ag-tl-open {
    color: var(--accent);
    font-weight: 700;
    opacity: 0;
    transition: opacity .15s;
  }
  .ag-tl-clickable:hover .ag-tl-open { opacity: 1; }

  /* ─── responsive ─── */
    .ag-detail-grid { grid-template-columns: 1fr; }
    .ag-guards { order: -1; }
  }
  @media (max-width: 820px) {
    .ag-kpi-grid { grid-template-columns: 1fr 1fr; }

<body>
<div id="root"></div>

<script>
  (function mountSymbols() {
    const d = window.AGENTMA;
    const ns = 'http://www.w3.org/2000/svg';
    const wrap = document.createElementNS(ns, 'svg');
    wrap.setAttribute('style', 'position:absolute;width:0;height:0;overflow:hidden');
    wrap.setAttribute('aria-hidden', 'true');
    function makeSym(id, viewBox) {
      const sym = document.createElementNS(ns, 'symbol');
      sym.setAttribute('id', id);
      sym.setAttribute('viewBox', viewBox);
      const g = document.createElementNS(ns, 'g');
      g.setAttribute('fill', 'none');
      g.setAttribute('stroke', 'currentColor');
      g.setAttribute('stroke-linecap', 'round');
      g.setAttribute('stroke-linejoin', 'round');
      d.paths.forEach(p => {
        const path = document.createElementNS(ns, 'path');
        path.setAttribute('d', p);
        g.appendChild(path);
      });
      sym.appendChild(g);
      return sym;
    }
    wrap.appendChild(makeSym('agentma', `0 0 ${d.w} ${d.h}`));
    wrap.appendChild(makeSym('agentma-head', '40 0 580 460'));
    document.body.insertBefore(wrap, document.body.firstChild);
  })();
</script>

<script type="text/babel">
  const root = ReactDOM.createRoot(document.getElementById('root'));
  const start = () => root.render(<window.AgentApp/>);
  if (document.fonts && document.fonts.ready) {
    Promise.race([document.fonts.ready, new Promise(r => setTimeout(r, 1500))]).then(start);
  } else {
    start();
  }
</script>
